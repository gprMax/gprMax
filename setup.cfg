[flake8]
max-line-length = 200
ignore = E402, W503
exclude =
    .git,
    __pycache__,
    build,
    dist

[tool:pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    slow: marks tests as slow (full simulation runs - deselect with '-m "not slow"')
    gpu: marks tests that require a CUDA-capable GPU
    mpi: marks tests that require an MPI installation
