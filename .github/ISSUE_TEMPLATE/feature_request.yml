name: Feature request
about: Suggest an enhancement or new feature for gprMax
title: "[FEATURE] "
labels: enhancement
assignees: ''

body:
  - type: markdown
    attributes:
      value: "Please describe the feature you'd like to see in gprMax."
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem does this solve?
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: usecases
    attributes:
      label: Use cases
  - type: textarea
    id: implementation
    attributes:
      label: Proposed implementation details
  - type: checkboxes
    id: backward
    attributes:
      label: Backwards compatibility
      options:
        - label: Backward compatible
          value: backward
  - type: textarea
    id: additional
    attributes:
      label: Additional context
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          value: searched
        - label: I included examples
          value: examples
        - label: I described benefits and drawbacks
          value: described
