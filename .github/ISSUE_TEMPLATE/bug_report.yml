name: Bug Report
description: Report a bug or unexpected behavior in gprMax
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please provide as much detail as possible to help us reproduce and fix the issue.
        
  - type: input
    id: version
    attributes:
      label: gprMax Version
      description: Which version of gprMax are you using? (run `python -c "import gprMax; print(gprMax.__version__)"`)
      placeholder: "e.g., v.3.1.7"
    validations:
      required: true
      
  - type: dropdown
    id: solver
    attributes:
      label: Solver Type
      description: Which solver are you using?
      options:
        - CPU (OpenMP)
        - GPU (CUDA)
        - Not sure
    validations:
      required: true
      
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      placeholder: "e.g., Ubuntu 22.04, macOS 13.2, Windows 11"
    validations:
      required: true
      
  - type: input
    id: python
    attributes:
      label: Python Version
      description: What version of Python are you using?
      placeholder: "e.g., Python 3.9.7"
    validations:
      required: true
      
  - type: input
    id: cuda
    attributes:
      label: CUDA Version (if using GPU)
      description: If using GPU solver, what CUDA version?
      placeholder: "e.g., CUDA 11.7"
      
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
      
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run the command '...'
        2. With input file '...'
        3. Observe error '...'
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
      
  - type: textarea
    id: error
    attributes:
      label: Error Messages
      description: Copy and paste any error messages or traceback
      render: shell
      
  - type: textarea
    id: input_file
    attributes:
      label: Input File (or minimal example)
      description: If possible, provide your input file or a minimal example that reproduces the issue
      render: python
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, output files, etc.)
      
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all the information requested above
          required: true
        - label: I have consulted the [documentation](http://docs.gprmax.com/)
          required: false