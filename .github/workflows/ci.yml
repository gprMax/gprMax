name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        backend: [cpu, mpi]
        include:
          - os: ubuntu-latest
            backend: cuda

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y openmpi-bin libopenmpi-dev
        if [ "${{ matrix.backend }}" == "cuda" ]; then
          sudo apt-get install -y nvidia-cuda-toolkit
        fi

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install open-mpi gcc

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows' && matrix.backend == 'mpi'
      shell: bash
      run: |
        choco install msmpi

    - name: Install Python Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        if [ "${{ matrix.backend }}" == "mpi" ]; then
          pip install mpi4py
        fi

    - name: Build gprMax
      shell: bash
      run: |
        python build.py --backend ${{ matrix.backend }}

    - name: Run Tests with Coverage
      shell: bash
      run: |
        pytest tests/ --cov=gprMax --cov-report=xml || echo "Tests finished with warnings or errors"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload Test Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.os }}-${{ matrix.backend }}
        path: |
          tests/*.log
