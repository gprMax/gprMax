name: Physics Validation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-physics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Run Physics Test
        run: python .github/workflows/script.py

      # Ye step tere 'physics_report.png' ko GitHub par save kar dega
      - name: Upload Plot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: physics-validation-plot
          path: physics_report.png
